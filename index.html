<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; 
            background: #000; color: #1ed760; 
            font-family: 'Courier New', monospace; 
            overflow-x: hidden; /* Prevents side scrolling */
        }

        /* The Search Bar Overlay */
        #ui {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 20px; border: 1px solid #1ed760;
            z-index: 1000; text-align: center;
            box-shadow: 0 0 20px rgba(30, 215, 96, 0.5);
        }

        input { 
            background: #000; color: #fff; 
            border: 1px solid #1ed760; padding: 10px; width: 250px; 
        }

        button { 
            background: #1ed760; color: #000; 
            border: none; padding: 10px 20px; cursor: pointer; font-weight: bold;
        }

        /* The Infinite Wall */
        #library {
            display: block;
            width: 100vw;
            min-height: 100vh;
            padding: 10px;
            font-size: 14px;
            line-height: 1.1;
            word-break: break-all; /* This ensures text wraps perfectly */
            white-space: normal;
        }

        .found-word {
            background: white;
            color: black;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="ui">
    <input type="text" id="searchTerm" placeholder="Search you existence...">
    <button onclick="findInInfinity()">SEARCH</button>
    <div style="font-size: 10px; margin-top: 10px; color: #888;"></div>
</div>

<div id="library"></div>

<script>
    const library = document.getElementById('library');
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

    // Fill the initial screen with text
    function generateWall(amount) {
        let text = "";
        for (let i = 0; i < amount; i++) {
            text += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return text;
    }

    // Initial fill: roughly 15,000 characters to cover most screens
    library.innerText = generateWall(15000);

    // Infinite Scroll: adds more when you reach the bottom
    window.onscroll = function() {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
            const moreText = document.createTextNode(generateWall(5000));
            library.appendChild(moreText);
        }
    };

    function findInInfinity() {
        const word = document.getElementById('searchTerm').value;
        if (!word) return;

        // Generate a random "Page Header"
        const sector = `\n\n[SECTOR-${Math.floor(Math.random()*999999)} FOUND]\n`;
        
        // Create a segment with your word hidden in it
        const randomPrefix = generateWall(200);
        const randomSuffix = generateWall(200);
        
        // Construct the "Found" block
        const foundContainer = document.createElement('span');
        foundContainer.innerHTML = `${sector}${randomPrefix}<span class="found-word">${word}</span>${randomSuffix}\n\n`;

        // Put the found word at the top of the screen
        library.prepend(foundContainer);
        window.scrollTo(0, 0);
    }
</script>

</body>
</html>
